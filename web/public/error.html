<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HYSA Code — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d10;
      color: #e4e4e8;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container { text-align: center; max-width: 480px; padding: 40px; }
    .logo { color: #00F2FE; font-size: 24px; font-weight: 700; letter-spacing: 1px; margin-bottom: 16px; }
    .title { font-size: 14px; color: #8a8f98; margin-bottom: 8px; }
    .message { font-size: 12px; color: #555; line-height: 1.6; }
    .retry { margin-top: 24px; display: inline-block; padding: 8px 24px; background: #00F2FE; color: #0d0d10; border: none; border-radius: 6px; font-family: inherit; font-size: 12px; cursor: pointer; }
    .retry:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">HYSA Code</div>
    <div class="title">System is updating</div>
    <div class="message">Please retry in 30 seconds.</div>
    <button class="retry" onclick="location.reload()">Retry Now</button>
  </div>
</body>
</html>
